version: "3.8"

services:
  tests:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      - ENV=test
      - BASE_URL=https://api.hh.ru
      - TIMEOUT=30
      - MAX_RETRIES=3
      - CI=true
    volumes:
      - ..:/app
    command: python -m pytest tests/ -v --tb=short -n auto --dist=loadscope

  lint:
    build:
      context: ..
      dockerfile: docker/Dockerfile.test
    environment:
      - ENV=test
    volumes:
      - ..:/app
    command: bash -c "ruff check . && black --check ."

  tests-parallel:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      - ENV=test
      - BASE_URL=https://api.hh.ru
      - TIMEOUT=30
      - MAX_RETRIES=3
      - CI=true
    volumes:
      - ..:/app
    command: python -m pytest tests/ -v -n auto --dist=loadscope
